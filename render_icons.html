<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: white; margin: 0; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .icon-container { padding: 10px; border: 1px solid #ccc; display: inline-block; }
        #icon128 { width: 128px; height: 128px; }
        #icon48 { width: 48px; height: 48px; }
        #icon32 { width: 32px; height: 32px; }
        #icon16 { width: 16px; height: 16px; }
        svg { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <div class="icon-container" id="container128"><div id="icon128"></div></div>
    <div class="icon-container" id="container48"><div id="icon48"></div></div>
    <div class="icon-container" id="container32"><div id="icon32"></div></div>
    <div class="icon-container" id="container16"><div id="icon16"></div></div>

    <script>
        const svgContent = `<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="160" height="160" rx="36" fill="#0f172a"/>
    <g>
        <path d="M80 40C50 40 40 70 40 80M80 55C65 55 55 75 55 80M80 70C75 70 70 75 70 80" stroke="#818cf8" stroke-width="6" stroke-linecap="round"/>
        <path d="M80 40C110 40 120 70 120 80M80 55C95 55 105 75 105 80M80 70C85 70 90 75 90 80" stroke="#818cf8" stroke-width="6" stroke-linecap="round" stroke-opacity="0.6"/>
        <rect x="75" y="90" width="10" height="40" rx="5" fill="#818cf8"/>
        <circle cx="80" cy="80" r="5" fill="#22d3ee" fill-opacity="0.8"/>
    </g>
</svg>`;
        ['128', '48', '32', '16'].forEach(size => {
            document.getElementById('icon' + size).innerHTML = svgContent;
        });
    </script>
</body>
</html>
